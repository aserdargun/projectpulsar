name: Deploy to Azure Static Web Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: azure-production
  cancel-in-progress: true

jobs:
  deploy:
    name: production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GREEN_GRASS_08ADA9C03 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Use Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production site
        run: npm run build

      - name: Deploy
        if: env.SWA_TOKEN != ''
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
          action: upload
          app_location: dist
          output_location: ""
          skip_app_build: true

      - name: Deployment not configured
        if: env.SWA_TOKEN == ''
        run: echo "Azure deployment token is unavailable."
